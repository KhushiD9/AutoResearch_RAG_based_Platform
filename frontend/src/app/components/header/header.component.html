<header class="header glass">
  <div class="header-content">
    <div class="logo">
      <h1>Research Paper Assistant</h1>
      <p>AI-Powered Research Discovery</p>
    </div>
    
    <nav class="navigation">
      <a 
        routerLink="/search" 
        [class.active]="isActive('/search')"
        class="nav-link glass-light">
        Search Papers
      </a>
      <a 
        routerLink="/chat" 
        [class.active]="isActive('/chat')"
        class="nav-link glass-light">
        Ask Questions
      </a>
      <a 
        routerLink="/history" 
        [class.active]="isActive('/history')"
        class="nav-link glass-light">
        History
      </a>
    </nav>
  </div>
</header>

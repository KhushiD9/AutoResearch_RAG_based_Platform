<div class="history-wrapper">
  <div class="history-header fade-in">
    <h2 class="gradient-text">Query History</h2>
    <button class="btn-ghost clear-all" *ngIf="entries.length > 0" (click)="clearAll()">Clear All</button>
  </div>

  <div class="empty-state glass fade-in" *ngIf="entries.length === 0 && !loading">
    <p>No query history yet. Search papers and ask questions to see them here.</p>
  </div>

  <div class="history-list" *ngIf="entries.length > 0">
    <div
      *ngFor="let e of entries; let i = index"
      class="history-card glass-light fade-up"
      [style.animation-delay]="(i * 0.05) + 's'">
      <div class="card-top">
        <span class="mode-badge">{{ e.mode | titlecase }}</span>
        <span class="card-col">{{ e.collection_name }}</span>
        <span class="card-time">{{ e.timestamp | date:'short' }}</span>
        <button class="delete-btn btn-ghost" (click)="deleteEntry(e.id)">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/>
          </svg>
        </button>
      </div>
      <div class="card-question">{{ e.question }}</div>
      <div class="card-answer">{{ e.answer | slice:0:280 }}{{ e.answer.length > 280 ? '...' : '' }}</div>
    </div>
  </div>
</div>
